<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <link rel="stylesheet" href="css/reset.css">
    <!-- 
        Vi bruker style tag her til å inkludere 
        alle css klasser ved siden av html kode
        for å skille flex klasser fra grid klasser
    -->
    <style>
        .flex-container {
            width: 100%;
            max-width: 940px;
            margin: 0 auto;
            background-color: #ddd;
            display: flex;
            flex-flow: row wrap;
            justify-content: space-between;
        }

        .flex-item {
            padding: 20px;
            font-size: 44px;
            color: #fff;
        }

        .box1 {
            background-color: rgb(91, 26, 152);
            flex: 1 0 200px;
        }

        .box2 {
            background-color: rgb(37, 74, 143);
            flex: 1 0 200px;
        }

        .box3 {
            background-color: rgb(146, 15, 41);
            flex: 1 0 200px;
        }

        .box1-1 {
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div class="flex-container">
        <div class="flex-item box1">
            <div class="box1-1">
                1-1
            </div>
        </div>
        <div class="flex-item box2">
            2
        </div>
        <div class="flex-item box3">
            3
        </div>
    </div>
    
</body>
</html>
